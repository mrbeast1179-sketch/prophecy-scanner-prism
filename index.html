<body>
<div id="root"><div class="em">Connecting to cvserver…</div></div>
<script src="./cv-bootstrap.js"></script>
<script>
(function(){
'use strict';

// ---- Static config --------------------------------------------------------
var T=['SPY','QQQ','IWM','DIA','TLT','AAPL','MSFT','NVDA','TSLA','AMZN','META','GOOGL'];
var FIELDS=['expiration_date','strike_price','contract_type','implied_volatility',
  'delta','gamma','theta','vega','bid','ask','midpoint','open_interest','day_volume','underlying_price'];
// Each per-side value array is in full FIELDS order, so this map indexes both
// call_vals and put_vals. Verified against the live cvserver chain response.
var IDX={EXP:0,STRIKE:1,TYPE:2,IV:3,DELTA:4,GAMMA:5,THETA:6,VEGA:7,BID:8,ASK:9,MID:10,OI:11,VOL:12,SPOT:13};
// Two product lenses. Tab IDs are stable (used by router code); only the
// display name carries the brand rename. LiveTape ≡ cross-symbol flow scan
// + per-ticker drill-down. GammaMap ≡ dealer-gamma exposure surface.
var TABS=[{id:'flow',name:'⚡ LiveTape'},{id:'heat',name:'🔥 GammaMap'}];

var st={tk:'SPY',tab:'flow',chain:null,chainTk:'',spot:0,ld:false,er:null,last:'',flowType:'all',flowMinOI:0,heatMode:'net',
  scan:[],scanAt:'',scanSort:{key:'score',dir:'desc'},scanType:'all',scanMinVol:0,scanMinScore:0,scanQ:''};
var R=document.getElementById('root');
var PLOT={responsive:true,displayModeBar:false};

// ---- Formatters & accessors ----------------------------------------------
function fmtK(v){if(v==null)return '—';v=+v;if(Math.abs(v)>=1e6)return (v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return (v/1e3).toFixed(0)+'k';return v.toFixed(0)}
function fmtPct(v){return v==null?'—':(v*100).toFixed(1)+'%'}
function fmtUSD(v){if(v==null)return '—';var a=Math.abs(v),s=v<0?'-':'';if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(0)+'M';if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'k';return s+'$'+a.toFixed(0)}
function callVals(s){return (s&&s[1])||[]}
function putVals(s){return (s&&s[2])||[]}
function num(v){return (typeof v==='number'&&isFinite(v))?v:0}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Per-expiry rows with every field we plot, pulled defensively.
function expData(exp){
  if(!exp||!exp.strikes) return [];
  return exp.strikes.map(function(s){
    var c=callVals(s), p=putVals(s);
    return {strike:s[0],
      cIV:c[IDX.IV], pIV:p[IDX.IV],
      cOI:num(c[IDX.OI]), pOI:num(p[IDX.OI]),
      cG:num(c[IDX.GAMMA]), pG:num(p[IDX.GAMMA]),
      cD:c[IDX.DELTA], pD:p[IDX.DELTA],
      cVol:num(c[IDX.VOL]), pVol:num(p[IDX.VOL])};
  });
}
function deriveSpot(chain){
  var exps=(chain&&chain.chain)||[];
  for(var i=0;i<exps.length;i++){
    var ss=exps[i].strikes||[];
    for(var j=0;j<ss.length;j++){
      var v=callVals(ss[j])[IDX.SPOT]||putVals(ss[j])[IDX.SPOT];
      if(v) return v;
    }
  }
  return 0;
}
function nearSpot(rows,spot,pct){
  if(!spot) return rows;
  var lo=spot*(1-pct), hi=spot*(1+pct);
  return rows.filter(function(r){return r.strike>=lo&&r.strike<=hi;});
}
function curExpIdx(){
  var ef=document.getElementById('ef');
  var v=ef?parseInt(ef.value):0;
  return isNaN(v)?0:v;
}

// ---- Shell (built once) ---------------------------------------------------
function shell(){
  R.innerHTML=''+
  '<div class="as">'+
    '<div class="tb"><h1>🧬 PRISM <small>· Option Flow & Gamma</small></h1>'+
      '<span class="bd" id="badge">LIVE</span>'+
      '<span style="margin-left:auto;font-size:11px;color:#7a8599" id="hdrtk">'+st.tk+' • cvserver</span></div>'+
    '<div class="tabs" id="tabs"></div>'+
    '<div class="mn">'+
      '<div class="sb">'+
        '<input class="ti" id="ti" value="'+st.tk+'" placeholder="Ticker (e.g. SPY)"/>'+
        '<div class="chips" id="chips"></div>'+
        '<div class="fs"><div class="fl">Expiration</div>'+
          '<select class="fs2" id="ef" style="width:100%"><option value="0">First</option></select></div>'+
        '<div class="hint">Both tabs read the same live option chain for the selected ticker. '+
          'Expiration drives LiveTape’s drill-down view; GammaMap scans the whole surface.</div>'+
      '</div>'+
      '<div class="ct"><div id="content"><div class="em">Loading '+st.tk+' chain…</div></div></div>'+
    '</div>'+
    '<div class="sb2"><span class="sd" id="dot"></span>'+
      '<span id="statustext">Connecting…</span>'+
      '<span style="margin-left:auto" id="lupdate"></span></div>'+
  '</div>';
  renderTabs(); renderChips(); bindShell(); setStatus();
}

function renderTabs(){
  var el=document.getElementById('tabs'); if(!el) return;
  el.innerHTML=TABS.map(function(t){return '<div class="tab '+(t.id===st.tab?'on':'')+'" data-tab="'+t.id+'">'+t.name+'</div>';}).join('');
}
function renderChips(){
  var c=document.getElementById('chips'); if(!c) return;
  c.innerHTML=T.map(function(t){return '<span class="chip '+(t===st.tk?'on':'')+'" data-t="'+t+'">'+t+'</span>';}).join('');
}

function bindShell(){
  var i=document.getElementById('ti');
  if(i) i.addEventListener('keydown',function(e){if(e.key==='Enter') selectTicker(this.value);});
  var ch=document.getElementById('chips');
  if(ch) ch.addEventListener('click',function(e){var c=e.target.closest('.chip'); if(c&&c.dataset.t) selectTicker(c.dataset.t);});
  var tb=document.getElementById('tabs');
  if(tb) tb.addEventListener('click',function(e){var t=e.target.closest('.tab'); if(t&&t.dataset.tab) setTab(t.dataset.tab);});
  var ef=document.getElementById('ef');
  if(ef) ef.addEventListener('change',function(){renderActiveTab();});
}

function selectTicker(t){
  t=(t||'').trim().toUpperCase(); if(!t) return;
  st.tk=t;
  var i=document.getElementById('ti'); if(i) i.value=st.tk;
  renderChips(); setStatus();
  loadData();
}
function setTab(id){
  st.tab=id; renderTabs(); renderActiveTab();
  tick();   // e.g. switching to Flow fetches the scan only if its cache has expired
}

function setStatus(){
  var rl=Date.now()<rlUntil;
  var bd=document.getElementById('badge');
  if(bd){bd.className='bd '+((st.er||rl)?'off':''); bd.textContent=rl?'RATE-LIMIT':(st.er?'ERROR':'LIVE');}
  var sd=document.getElementById('dot');
  if(sd) sd.className='sd '+(st.ld?'ld':((st.er||rl)?'er':''));
  var sx=document.getElementById('statustext');
  if(sx) sx.textContent=st.ld?'Fetching '+st.tk+'…':(rl?rlText():(st.er||'Connected to cvserver'));
  var h=document.getElementById('hdrtk'); if(h) h.textContent=st.tk+' • cvserver';
  var lu=document.getElementById('lupdate');
  if(lu) lu.textContent=(st.last?'Updated '+st.last+' · ':'')+reqPerHr()+' req/hr';
}

// ---- Shared fetch layer (every tab pulls through here) --------------------
// One pipe to cvserver for the whole app. A TTL cache + in-flight dedupe means
// LiveTape and the GammaMap heatmap share ONE chain request per
// ticker per CHAIN_TTL (tab switches and repeat chip clicks are free), and the
// cross-symbol scan polls only while the Flow tab is actually showing. The
// feed is snapshot data (OI / day_volume / greeks — no tick tape), so 2–3 min
// refreshes lose nothing. Worst case while visible on Flow: 30 chain + 20
// scan = 50 req/hr, vs ~420/hr with the old dual 15s/20s blind timers. A 429
// trips a cool-down: polling pauses, cached data keeps rendering.
var CHAIN_TTL=120000;           // per-ticker chain refresh (2 min ≈ 30 req/hr)
var SCAN_TTL=180000;            // cross-symbol scan refresh (3 min ≈ 20 req/hr)
var RL_PAUSE=600000;            // after a 429: pause all polling 10 min
var FAIL_BACKOFF=90000;         // after a failed request: no auto-retry for 90s, escalating on repeats
var chainCache={};              // tk → {data, at}
var scanCache={rows:null,at:0};
var inflight={};                // key → promise; concurrent callers share one request
var fails={};                   // key → {until, msg, n}; failure backoff so errors can't retry-storm
var rlUntil=0;                  // timestamp; > now means rate-limited
var reqLog=[];                  // request timestamps for the req/hr readout

function reqPerHr(){var now=Date.now(); while(reqLog.length&&now-reqLog[0]>3600000) reqLog.shift(); return reqLog.length;}
function noteReq(){reqLog.push(Date.now()); reqPerHr();}
function isRateLimited(e){var m=((e&&e.message)||String(e)).toLowerCase(); return m.indexOf('429')>=0||m.indexOf('limit reached')>=0;}
function rlText(){return 'Hourly API limit hit — polling paused, retrying at '+new Date(rlUntil).toLocaleTimeString()+' · showing cached data';}
// Failure backoff: without this, a fast-failing request (5xx, network blip)
// would be re-issued by every 5s tick — a worse storm than the one this
// fetch layer exists to prevent. Consecutive failures stretch the pause.
function noteFail(key,e){var f=fails[key]||{n:0}; f.n++; f.until=Date.now()+Math.min(FAIL_BACKOFF*f.n,600000); f.msg=(e&&e.message)||String(e); fails[key]=f;}
function failBlocked(key){var f=fails[key]; return (f&&Date.now()<f.until)?f:null;}

function fetchChain(tk){
  var c=chainCache[tk], now=Date.now();
  if(c&&now-c.at<CHAIN_TTL) return Promise.resolve(c.data);
  if(now<rlUntil) return c?Promise.resolve(c.data):Promise.reject(new Error(rlText()));  // stale beats nothing
  var key='chain:'+tk;
  var f=failBlocked(key);
  if(f) return c?Promise.resolve(c.data):Promise.reject(new Error(f.msg));
  if(inflight[key]) return inflight[key];
  noteReq();
  inflight[key]=window.cvApi.chain(tk,FIELDS).then(function(d){
    delete inflight[key]; delete fails[key]; chainCache[tk]={data:d,at:Date.now()}; return d;
  },function(e){
    delete inflight[key]; if(isRateLimited(e)) rlUntil=Date.now()+RL_PAUSE; else noteFail(key,e); throw e;
  });
  return inflight[key];
}
function fetchScan(){
  var now=Date.now();
  if(scanCache.rows&&now-scanCache.at<SCAN_TTL) return Promise.resolve(scanCache.rows);
  if(now<rlUntil) return scanCache.rows?Promise.resolve(scanCache.rows):Promise.reject(new Error(rlText()));
  var f=failBlocked('scan');
  if(f) return scanCache.rows?Promise.resolve(scanCache.rows):Promise.reject(new Error(f.msg));
  if(inflight.scan) return inflight.scan;
  noteReq();
  inflight.scan=window.cvApi.screen({
    columns:['underlying_ticker','ticker','contract_type','strike_price','expiration_date','day_volume','open_interest','implied_volatility','delta','underlying_price'],
    filters:[{field:'day_volume',op:'gt',value:250}],
    sort:[{field:'day_volume',direction:'desc'}],
    limit:300
  }).then(function(sf){
    delete inflight.scan; delete fails.scan; scanCache={rows:sf.rows||[],at:Date.now()}; return scanCache.rows;
  },function(e){
    delete inflight.scan; if(isRateLimited(e)) rlUntil=Date.now()+RL_PAUSE; else noteFail('scan',e); throw e;
  });
  return inflight.scan;
}

// ---- Data load (shared across all tabs) -----------------------------------
// reqSeq guards against overlapping loads: a slow request for a previous ticker
// resolving after a ticker switch must NOT overwrite the current symbol's data.
var reqSeq=0;
async function loadData(){
  var myId=++reqSeq;
  st.ld=true; st.er=null; setStatus();
  try{
    var d=await fetchChain(st.tk);
    if(myId!==reqSeq) return;                 // superseded by a newer load
    st.chain=d; st.chainTk=st.tk; st.spot=deriveSpot(d);
    // Cross-symbol flow now lives in the BladeMap scanner (loadScan); the
    // per-ticker chain still drives the drill-down chart and GammaMap.
    populateExpiry();
    var at=chainCache[st.tk]?chainCache[st.tk].at:Date.now();
    st.last=new Date(at).toLocaleTimeString();
    renderActiveTab();
  }catch(e){
    if(myId!==reqSeq) return;
    st.er=e.message||String(e); console.error('cvApi error:',e);
    renderActiveTab();                        // error screen only if no cached view fits
  }finally{
    if(myId===reqSeq){ st.ld=false; setStatus(); }
  }
}

function populateExpiry(){
  var ef=document.getElementById('ef'); if(!ef||!st.chain||!st.chain.chain) return;
  var exps=st.chain.chain.map(function(c){return c.expiration;});
  var sig=exps.join('|');
  if(ef.getAttribute('data-sig')===sig) return;   // unchanged: don't snap an open dropdown shut mid-poll
  var sel=ef.options[ef.selectedIndex], prevDate=sel?sel.textContent:'';
  ef.innerHTML=exps.map(function(e,i){return '<option value="'+i+'">'+e+'</option>';}).join('');
  ef.setAttribute('data-sig',sig);
  for(var i=0;i<exps.length;i++){ if(exps[i]===prevDate){ ef.value=i; break; } }  // preserve by date, not index
}

// ---- Tab dispatch ---------------------------------------------------------
// Rebuild the tab's DOM only when tab / ticker / expiry change; a plain 15s
// data poll just refreshes the plots in place so it never steals input focus.
var builtKey=null;
function renderActiveTab(){
  var el=document.getElementById('content'); if(!el) return;
  // A failed poll only blanks the tab when there's no cached chain for the
  // CURRENT ticker — otherwise keep the charts up and let the status bar
  // carry the error (matters during 429 cool-downs). The Flow tab is exempt
  // entirely: its scanner doesn't depend on the chain, so a chain error only
  // degrades the drill-down pane (handled inside drawFlowChart).
  if(st.tab!=='flow'){
    if(st.er&&(!st.chain||st.chainTk!==st.tk)){el.innerHTML='<div class="em">'+esc(st.er)+'</div>'; builtKey=null; return;}
    if(!st.chain||!st.chain.chain||!st.chain.chain.length){el.innerHTML='<div class="em">Loading '+st.tk+' chain…</div>'; builtKey=null; return;}
  }
  // Flow tab builds once; the scanner persists while the drill-down chart
  // updates in place on ticker change. Heat rebuilds per ticker+expiry.
  var key=(st.tab==='flow')?'flow':(st.tab+'|'+st.tk+'|'+curExpIdx());
  var rebuild=(builtKey!==key); builtKey=key;
  if(st.tab==='flow') renderFlow(el,rebuild);
  else if(st.tab==='heat') renderHeat(el,rebuild);
  else el.innerHTML='<div class="em">Unknown tab.</div>';
}

// ============================ TAB 1: LiveTape =============================

// blademap build) — cross-symbol, scored, sortable. Built entirely on LIVE
// cvserver data: day_volume-vs-OI is the unusual-activity core signal. This
// feed has no per-trade tape (bid/ask/trade_price/size are null), so Flow-type
// is a volume-magnitude class and Lean is contract-type bias — NOT synthesized

          '<input class="fi" id="sq" placeholder="Ticker…" style="min-width:88px" value="'+(st.scanQ||'')+'"/>'+
          '<span class="note">Live cross-symbol flow · cvserver day-volume vs OI. No per-trade tape on this feed — Flow-type = volume-magnitude class; Lean = contract-type bias.</span>'+
        '</div>'+
        '<div class="scantable" id="scantable"><div class="em">Scanning market flow…</div></div>'+
        '<div class="drill" id="drill">'+

          '<div class="kpi">'+
            kpi('Spot','spot','b')+kpi('Put/Call OI','pcr','y')+kpi('Total OI','toi','')+
            kpi('ATM IV','atmiv','g')+kpi('Day Vol','tvol','b')+'</div>'+
          '<div class="cw">'+
            '<div id="cc" style="flex:1;min-height:0"></div>'+
            '<div class="lg"><span>● Call OI</span><span>● Put OI</span><span>— Delta</span><span style="color:#38bdf8">┄ Spot</span><span style="color:#a855f7">┄ Flip</span><span style="color:#f59e0b">┄ Max Pain</span><span style="opacity:.6">(click a strike)</span></div>'+
          '</div>'+
          '<div class="det" id="fdet" style="display:none"></div>'+
        '</div>'+
      '</div>';
    // Filter controls → re-render the table in place (no rebuild).
    var stype=document.getElementById('stype'); if(stype){stype.value=st.scanType; stype.addEventListener('change',function(){st.scanType=this.value; renderScanner();});}
    var smv=document.getElementById('sminvol'); if(smv) smv.addEventListener('input',function(){st.scanMinVol=parseFloat(this.value)||0; renderScanner();});
    var sms=document.getElementById('sminscore'); if(sms) sms.addEventListener('input',function(){st.scanMinScore=parseFloat(this.value)||0; renderScanner();});
    var sq=document.getElementById('sq'); if(sq) sq.addEventListener('input',function(){st.scanQ=(this.value||'').trim().toUpperCase(); renderScanner();});
    // One delegated listener on the table container survives innerHTML swaps:
    // header click → sort; row click → drill into that underlying.
    var tbl=document.getElementById('scantable');
    if(tbl) tbl.addEventListener('click',function(e){
      var th=e.target.closest('th[data-k]');
      if(th){ sortScan(th.dataset.k); return; }

// ---- Scanner engine (derived live, BladeMap-faithful intent) --------------
// Trading-day DTE: calendar days minus weekends (a light nod to the spec's
// NYSE-calendar DTE without pulling a holiday library into a single file).
function bizDTE(expStr){
  if(!expStr) return null;
  var end=new Date(expStr+'T16:00:00Z'), now=new Date();
  if(end<=now) return 0;
  var cal=(end-now)/86400000, full=Math.min(Math.floor(cal),800), d=0, cur=new Date(now);
  for(var i=0;i<full;i++){ cur.setUTCDate(cur.getUTCDate()+1); var wd=cur.getUTCDay(); if(wd!==0&&wd!==6) d++; }
  return d;
}
// Flow-type class — mirrors BladeMap sweep/block/split badges, but keyed off
// volume magnitude + vol/OI (the only signals a print-less feed can support).
function scanType(r){
  if(r.vol>=25000) return 'sweep';
  if(r.vol>=8000) return 'block';
  if(r.volOI>=2) return 'unusual';
  if(r.volOI>=1) return 'split';
  return 'regular';
}
// Flow Score 0–100 — BladeMap's tiered composite, on live inputs only:
// positioning freshness (vol/OI), size, notional, urgency (DTE), OTM lean.
function scanScore(r){
  var dl=Math.abs(r.delta||0);
  var pos=Math.min(r.volOI/3,1);
  var size=Math.min(Math.log(Math.max(r.vol,1))/Math.log(50000),1);
  var notl=Math.min(Math.log(Math.max(r.notional,1))/Math.log(50e6),1);
  var urg=r.dte==null?0.3:(r.dte<=2?1:r.dte<=7?0.7:r.dte<=30?0.4:0.15);
  var otm=r.delta==null?0.3:Math.max(0,Math.min((0.5-dl)/0.4,1));
  var s=pos*0.34+size*0.24+notl*0.18+urg*0.14+otm*0.10;
  return Math.max(0,Math.min(100,Math.round(s*100)));
}
function scoreGrade(s){ return s>=80?'crit':s>=65?'high':s>=50?'elev':'norm'; }

// Market-wide scan — independent of the selected ticker; refreshed through
// fetchScan's shared cache and ONLY while the Flow tab is showing. Sorted by
// day_volume desc so the most active flow surfaces first.
async function loadScan(){
  try{
    var rows=await fetchScan();
    st.scan=rows.map(function(r){
      var vol=num(r[5]), oi=num(r[6]), strike=num(r[3]);
      var o={under:r[0],contract:r[1],type:r[2],strike:strike,exp:r[4],vol:vol,oi:oi,
             iv:r[7],delta:r[8],spot:num(r[9]),volOI:oi>0?vol/oi:(vol>0?99:0),
             notional:vol*100*strike};
      o.dte=bizDTE(r[4]); o.score=scanScore(o); o.ftype=scanType(o);
      return o;
    });
    st.scanAt=new Date(scanCache.at||Date.now()).toLocaleTimeString();
  }catch(e){ console.log('Scan fetch failed (non-critical):',e); }
  // Full dispatch (not just renderScanner): builds the Flow tab if the chain
  // request is still pending/failed, so scan data is never held hostage by it.
  if(st.tab==='flow') renderActiveTab();
  setStatus();
}

function sortScan(k){
  var s=st.scanSort;
  if(s.key===k) s.dir=(s.dir==='desc'?'asc':'desc');
  else { s.key=k; s.dir=(k==='under'||k==='type'||k==='ftype')?'asc':'desc'; }
  renderScanner();
}
function scanFiltered(){
  var q=st.scanQ;
  var rows=st.scan.filter(function(r){
    if(st.scanType!=='all' && r.type!==st.scanType) return false;
    if(st.scanMinVol && r.vol<st.scanMinVol) return false;
    if(st.scanMinScore && r.score<st.scanMinScore) return false;
    if(q && (r.under||'').toUpperCase().indexOf(q)<0) return false;
    return true;
  });
  var k=st.scanSort.key, dir=st.scanSort.dir==='desc'?-1:1;
  rows.sort(function(a,b){
    var av=a[k], bv=b[k];
    if(typeof av==='string'||typeof bv==='string'){
      return String(av).localeCompare(String(bv))*dir;
    }
    av=(av==null?-Infinity:av); bv=(bv==null?-Infinity:bv);
    return (av<bv?-1:av>bv?1:0)*dir;
  });
  return rows;
}

// SCAN_COLS drives both renderScanner's body and the sortable header. LiveTape
// surfaces two display columns derived in loadScan: the underlying ticker
// price at fetch ("Spot"/Entry) and the underlying's expiry date badge.
// The screen fetch timestamp (formerly rendered as a "Snapshot" per-row
// cell) is intentionally NOT a column: every row in a single fetch shares
// the same value because convexvalue updates the screen feed atomically,
// so 200 identical cells would be pure noise. The same info is surfaced in
// the "Refreshed" KPI cell on the stat bar above the table instead.
var SCAN_COLS=[
  {k:'score',t:'Score',l:false},{k:'under',t:'Ticker',l:true},{k:'type',t:'C/P',l:true},
  {k:'strike',t:'Strike',l:false},{k:'dte',t:'DTE',l:false},
  {k:'spot',t:'Spot',l:false},
  {k:'vol',t:'Volume',l:false},
  {k:'oi',t:'OI',l:false},{k:'volOI',t:'Vol/OI',l:false},{k:'notional',t:'Notional',l:false},
  {k:'iv',t:'IV',l:false},{k:'ftype',t:'Flow',l:true},{k:'lean',t:'Lean',l:true}
];
function renderScanner(){
  var el=document.getElementById('scantable'); if(!el) return;
  if(!st.scan.length){
    var msg=Date.now()<rlUntil?rlText():(failBlocked('scan')?'Scan fetch failed — auto-retrying shortly':'Scanning market flow…');
    el.innerHTML='<div class="em">'+esc(msg)+'</div>'; renderScanStats([]); return;
  }
  var rows=scanFiltered();
  renderScanStats(rows);
  if(!rows.length){ el.innerHTML='<div class="em">No contracts pass these filters</div>'; return; }
  var s=st.scanSort, arrow=s.dir==='desc'?' ▾':' ▴';
  var head='<thead><tr>'+SCAN_COLS.map(function(c){
    return '<th class="'+(c.l?'l':'')+(c.k===s.key?' on':'')+'" data-k="'+c.k+'">'+c.t+(c.k===s.key?arrow:'')+'</th>';
  }).join('')+'</tr></thead>';
  var body=rows.slice(0,200).map(function(r){
    var isCall=r.type==='call';
    var strk=r.strike%1===0?r.strike.toFixed(0):r.strike.toFixed(1);
    var otm=r.delta==null?'':(Math.abs(r.delta)<0.45?'OTM':'ITM');
    return '<tr data-u="'+esc(r.under)+'"'+(r.under===st.tk?' class="sel"':'')+'>'+
      '<td><span class="sc '+scoreGrade(r.score)+'">'+r.score+'</span></td>'+
      '<td class="l"><span class="tk">'+esc(r.under)+'</span> <span class="sub">'+esc((r.exp||'').slice(5))+'</span></td>'+
      '<td class="l"><span class="'+(isCall?'tcall':'tput')+'">'+(isCall?'CALL':'PUT')+'</span></td>'+
      '<td>'+strk+'</td>'+
      '<td>'+(r.dte==null?'—':r.dte+'d')+'</td>'+
      '<td>'+(r.spot>0?r.spot.toFixed(2):'—')+'</td>'+
      '<td>'+fmtK(r.vol)+'</td>'+
      '<td>'+fmtK(r.oi)+'</td>'+
      '<td>'+(r.volOI>=99?'99+':r.volOI.toFixed(1))+'x</td>'+
      '<td>'+fmtUSD(r.notional)+'</td>'+
      '<td>'+(r.iv!=null?fmtPct(r.iv):'—')+'</td>'+
      '<td class="l"><span class="flt '+r.ftype+'">'+r.ftype.toUpperCase()+'</span></td>'+
      '<td class="l"><span class="lean '+(isCall?'bull':'bear')+'">'+(isCall?'▲ BULL':'▼ BEAR')+'</span>'+(otm?' <span class="sub">'+otm+'</span>':'')+'</td>'+
    '</tr>';
  }).join('');
  el.innerHTML='<table class="stab">'+head+'<tbody>'+body+'</tbody></table>';
}
function renderScanStats(rows){
  var host=document.getElementById('scanstats'); if(!host) return;
  var notl=0, cv=0, pv=0, unusual=0, cnt={};
  rows.forEach(function(r){
    notl+=r.notional;
    if(r.type==='call') cv+=r.vol; else pv+=r.vol;
    if(r.volOI>=2) unusual++;
    cnt[r.under]=(cnt[r.under]||0)+1;
  });
  var top='—', best=0; Object.keys(cnt).forEach(function(u){ if(cnt[u]>best){best=cnt[u]; top=u;} });
  var tv=cv+pv, cpct=tv>0?Math.round(cv/tv*100):0;
  host.innerHTML=''+
    skpi('Contracts',rows.length+' / '+st.scan.length,'b')+
    skpi('Notional Σ',fmtUSD(notl),'')+
    skpi('Call/Put Vol',tv>0?(cpct+'% / '+(100-cpct)+'%'):'—',cpct>=50?'g':'r')+
    skpi('Unusual (≥2×)',String(unusual),'y')+
    skpi('Top Name',top+(best?' ·'+best:''),'')+
    skpi('Refreshed',st.scanAt||'—','');
}
function skpi(label,v,cls){return '<div class="skpi"><div class="skl">'+label+'</div><div class="skv '+(cls||'')+'">'+v+'</div></div>';}

function drawFlowChart(){
  var el=document.getElementById('cc'); if(!el) return;
  // The Flow tab renders without a chain (scanner is independent); only this
  // drill-down pane needs it, so degrade just this pane on error/loading.
  if(!st.chain||!st.chain.chain||!st.chain.chain.length||st.chainTk!==st.tk){
    Plotly.purge(el);
    el.innerHTML='<div class="em">'+(st.er?esc(st.er):'Loading '+st.tk+' chain…')+'</div>';
    return;
  }
  var exp=st.chain.chain[curExpIdx()];
  if(!exp||!exp.strikes||!exp.strikes.length){Plotly.purge(el); el.innerHTML='<div class="em">No strikes for this expiry</div>'; return;}

  var spot=st.spot;
  var rows=expData(exp).filter(function(r){return Math.max(r.cOI,r.pOI)>=st.flowMinOI;});
  computeKpis(exp,spot);
  if(!rows.length){Plotly.purge(el); el.innerHTML='<div class="em">No strikes pass the Min-OI filter</div>'; return;}

  var strikes=rows.map(function(r){return r.strike;});
  var callOI=rows.map(function(r){return r.cOI;});
  var putOI=rows.map(function(r){return r.pOI;});
  var delta=rows.map(function(r){return (st.flowType==='put'?r.pD:r.cD)||0;});
  var showCall=st.flowType!=='put', showPut=st.flowType!=='call';
  var maxOI=Math.max.apply(null,(showCall?callOI:[]).concat(showPut?putOI:[]))||1;
  if(maxOI===0){Plotly.purge(el); el.innerHTML='<div class="em">All OI is 0 here</div>'; return;}

  var traces=[];
  if(showCall) traces.push({y:strikes,x:callOI.map(function(v){return -(v/maxOI)*100;}),type:'bar',orientation:'h',name:'Call OI',marker:{color:'rgba(52,211,153,0.7)'},customdata:callOI,hovertemplate:'Call OI %{customdata:,}<extra></extra>'});
  if(showPut) traces.push({y:strikes,x:putOI.map(function(v){return (v/maxOI)*100;}),type:'bar',orientation:'h',name:'Put OI',marker:{color:'rgba(244,63,94,0.7)'},customdata:putOI,hovertemplate:'Put OI %{customdata:,}<extra></extra>'});
  traces.push({y:strikes,x:delta.map(function(v){return (Math.abs(v)-0.5)*200;}),type:'scatter',mode:'lines',name:'Delta',line:{color:'#fbbf24',width:2},customdata:delta,hovertemplate:'Δ %{customdata:.2f}<extra></extra>'});
  if(spot>0) traces.push({y:[spot,spot],x:[-100,100],type:'scatter',mode:'lines',name:'Spot '+spot.toFixed(0),line:{color:'#38bdf8',width:1,dash:'dot'},hoverinfo:'name'});

  // Overlay the derived key levels (gamma flip = whole-chain, max pain = this expiry).
  var struct=computeStructure();
  function hline(y,color){return {type:'line',x0:0,x1:1,xref:'paper',y0:y,y1:y,line:{color:color,width:1,dash:'dot'}};}
  var shapes=[];
  if(struct.flip!=null) shapes.push(hline(struct.flip,'#a855f7'));
  if(struct.maxpain!=null) shapes.push(hline(struct.maxpain,'#f59e0b'));

  var layout={
    paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',barmode:'overlay',
    margin:{l:52,r:14,t:8,b:28},
    xaxis:{title:{text:'OI (normalized) · Calls ← → Puts',font:{size:9}},color:'#64748b',zeroline:true,zerolinecolor:'#475569',gridcolor:'#1e293b',tickfont:{color:'#64748b',size:9}},
    yaxis:{color:'#64748b',gridcolor:'#1e293b',tickfont:{color:'#64748b',size:9}},
    legend:{orientation:'h',y:1.08,font:{size:9}},showlegend:false,
    hovermode:'closest', uirevision:'flow', shapes:shapes
  };
  Plotly.react(el,traces,layout,PLOT);
  // Click a bar/strike → detail readout. removeAllListeners avoids stacking handlers across polls.
  if(el.removeAllListeners) el.removeAllListeners('plotly_click');
  if(el.on) el.on('plotly_click',function(ev){
    var p=ev&&ev.points&&ev.points[0]; if(!p) return;
    showStrikeDetail(rows, p.y);
  });
  var ct=document.getElementById('ctitle');
  if(ct) ct.textContent='Open Interest — '+st.chain.symbol+' ('+exp.expiration+') · '+strikes.length+' strikes';
}

// Render the clicked strike's per-side detail into #fdet.
function showStrikeDetail(rows, strike){
  var el=document.getElementById('fdet'); if(!el) return;
  var r=null,best=Infinity;
  (rows||[]).forEach(function(x){var g=Math.abs(x.strike-strike); if(g<best){best=g; r=x;}});
  if(!r){el.style.display='none'; return;}
  el.style.display='flex';
  el.innerHTML='<b>'+(r.strike%1===0?r.strike.toFixed(0):r.strike.toFixed(2))+'</b>'+
    '<span class="cl">C: '+fmtK(r.cOI)+' OI · '+(r.cIV!=null?fmtPct(r.cIV):'—')+' IV · Δ'+(r.cD!=null?r.cD.toFixed(2):'—')+'</span>'+
    '<span class="pu">P: '+fmtK(r.pOI)+' OI · '+(r.pIV!=null?fmtPct(r.pIV):'—')+' IV · Δ'+(r.pD!=null?r.pD.toFixed(2):'—')+'</span>'+
    '<span>Γ c'+r.cG.toFixed(4)+' / p'+r.pG.toFixed(4)+'</span>'+
    '<span class="cx" onclick="this.parentNode.style.display=\'none\'">✕</span>';
}

function computeKpis(exp,spot){
  var totCall=0,totPut=0,totVol=0,atmIv=null,bestGap=Infinity;
  expData(exp).forEach(function(r){
    totCall+=r.cOI; totPut+=r.pOI; totVol+=r.cVol+r.pVol;
    if(spot>0){
      var gap=Math.abs((r.strike||0)-spot);
      if(gap<bestGap){bestGap=gap; var ivs=[r.cIV,r.pIV].filter(function(v){return v!=null;});
        atmIv=ivs.length?ivs.reduce(function(a,b){return a+b;},0)/ivs.length:null;}
    }
  });
  setKpi('spot',spot>0?spot.toFixed(2):'—');
  setKpi('pcr',totCall>0?(totPut/totCall).toFixed(2):'—');
  setKpi('toi',fmtK(totCall+totPut));
  setKpi('atmiv',atmIv!=null?fmtPct(atmIv):'—');
  setKpi('tvol',fmtK(totVol));
}
function kpi(label,id,cls){return '<div class="kp"><div class="kpl">'+label+'</div><div class="kpv '+(cls||'')+'" id="kp_'+id+'">—</div></div>';}
function setKpi(id,v){var e=document.getElementById('kp_'+id); if(e) e.textContent=v;}

// ============================ TAB 2: GammaMap =============================
// Dealer gamma-exposure (GEX) heatmap: strikes (rows) × expirations (cols),
// colour = net dealer gamma per cell ≈ (callΓ·callOI − putΓ·putOI)·100·S²·0.01,
// in $MM per 1% move. Green = long-gamma (price-stabilising / pinning), red =
// short-gamma (price-accelerating). Windowed to ±15% of spot. This is the
// market-structure view a desk watches for pin risk and gamma flips.
function renderHeat(host,rebuild){
  if(rebuild){
    host.innerHTML=''+
      '<div class="heatwrap">'+
        '<div class="heath" id="heath">🔥 Dealer Gamma Exposure — '+st.chain.symbol+'</div>'+
        '<div style="padding-bottom:6px"><span class="seg" id="hseg">'+
          '<button data-m="net">Net GEX</button><button data-m="call">Call γ</button><button data-m="put">Put γ</button></span></div>'+
        '<div class="kpi" id="hlev">'+
          kpi('Spot','h_spot','b')+kpi('Gamma Flip','h_flip','y')+kpi('Net GEX /1%','h_gex','')+
          kpi('Max Pain','h_mp','y')+kpi('IV Skew (C–P)','h_skew','y')+kpi('Regime','h_reg','')+
        '</div>'+
        '<div class="pinstrip">'+
          '<div class="pincol"><div class="pinh">Top Long-γ Strikes</div><div id="pinlong"></div></div>'+
          '<div class="pincol"><div class="pinh">Top Short-γ Strikes</div><div id="pinshort"></div></div>'+
        '</div>'+
        '<div id="heatplot" style="flex:1;min-height:0"></div>'+
        '<div id="heatexp" style="height:118px;flex-shrink:0;display:flex;flex-direction:column"></div>'+
        '<div class="det" id="hdet" style="display:none"></div>'+
      '</div>';
    var seg=document.getElementById('hseg');
    if(seg) seg.addEventListener('click',function(e){
      var b=e.target.closest('button'); if(!b||!b.dataset.m) return;
      st.heatMode=b.dataset.m; drawHeatPlot();
    });
  }
  var hh=document.getElementById('heath');
  if(hh) hh.innerHTML='🔥 Dealer Gamma Exposure — '+st.chain.symbol+
    ' <small>strike × expiry · $MM / 1% · green = long γ, red = short γ · spot '+(st.spot?st.spot.toFixed(2):'—')+'</small>';
  setHeatLevels();
  renderTopStrikes();
  drawHeatPlot();
  drawExpBars();
}

function drawHeatPlot(){
  var el=document.getElementById('heatplot'); if(!el) return;
  var seg=document.getElementById('hseg');
  if(seg) Array.prototype.forEach.call(seg.children,function(b){b.className=(b.dataset.m===st.heatMode)?'on':'';});
  var label=st.heatMode==='call'?'Call γ':st.heatMode==='put'?'Put γ':'Net GEX';
  var h=buildGexHeat(st.chain,st.spot,st.heatMode);
  if(!h.y.length||!h.x.length){Plotly.purge(el); el.innerHTML='<div class="em">Not enough gamma data to map</div>'; return;}

  var flat=[]; h.z.forEach(function(row){row.forEach(function(v){if(v!=null) flat.push(Math.abs(v));});});
  flat.sort(function(a,b){return a-b;});
  var M=flat.length?(flat[Math.floor(flat.length*0.95)]||1):1; if(!M) M=1;

  var trace={type:'heatmap',x:h.x,y:h.y,z:h.z,customdata:h.cd,
    zmid:0,zmin:-M,zmax:M,
    colorscale:[[0,'#b91c1c'],[0.5,'#0b0d12'],[1,'#15803d']],
    hoverongaps:false,xgap:1,ygap:1,
    colorbar:{title:{text:'$MM',font:{color:'#94a3b8',size:9}},tickfont:{color:'#64748b',size:9},thickness:10,len:.9},
    hovertemplate:'<b>K %{y}</b> · %{x}<br>'+label+
      ': %{z:+.2f} $MM/1%<br>%{customdata}<extra></extra>'};
  var struct=computeStructure();
  var shapes=[];
  if(st.spot) shapes.push({type:'line',x0:-0.5,x1:h.x.length-0.5,y0:st.spot,y1:st.spot,line:{color:'#38bdf8',width:1,dash:'dot'}});
  if(struct.flip!=null) shapes.push({type:'line',x0:-0.5,x1:h.x.length-0.5,y0:struct.flip,y1:struct.flip,line:{color:'#a855f7',width:1,dash:'dot'}});
  var layout={
    paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
    margin:{l:54,r:10,t:6,b:70},
    xaxis:{color:'#64748b',tickfont:{color:'#64748b',size:9},tickangle:-40,type:'category'},
    yaxis:{title:{text:'Strike · ┄spot ┄flip',font:{size:9}},color:'#64748b',tickfont:{color:'#64748b',size:9}},
    shapes:shapes, uirevision:'heat'
  };
  Plotly.react(el,[trace],layout,PLOT);
  if(el.removeAllListeners) el.removeAllListeners('plotly_click');
  if(el.on) el.on('plotly_click',function(ev){
    var p=ev&&ev.points&&ev.points[0]; if(!p) return;
    var d=document.getElementById('hdet'); if(!d) return;
    d.style.display='flex';
    d.innerHTML='<b>'+p.y+'</b><span>'+esc(String(p.x))+'</span><span>'+label+': <b>'+(p.z!=null?(+p.z).toFixed(2):'—')+'</b> $MM/1%</span>'+
      '<span class="cx" onclick="this.parentNode.style.display=\'none\'">✕</span>';
  });
}
// Populate the GammaMap key-levels strip from computeStructure().
function setHeatLevels(){
  var s=computeStructure();
  setKpi('h_spot', s.spot?s.spot.toFixed(2):'—');
  setKpi('h_flip', s.flip!=null?s.flip.toFixed(2):'—');
  setKpi('h_gex', fmtUSD(s.net));
  setKpi('h_mp', s.maxpain!=null?(s.maxpain%1===0?s.maxpain.toFixed(0):s.maxpain.toFixed(1)):'—');
  setKpi('h_skew', s.skew!=null?((s.skew>0?'+':'')+(s.skew*100).toFixed(1)+'%'):'—');
  // Color the skew: positive (calls pricier = demand for upside) y/amber;
  // negative (puts pricier = bearish hedging demand) r/rose.
  var sk=document.getElementById('kp_h_skew');
  if(sk && s.skew!=null) sk.className='kpv '+(s.skew>=0?'y':'r');
  var gx=document.getElementById('kp_h_gex'); if(gx) gx.className='kpv '+(s.net>=0?'g':'r');
  var reg=document.getElementById('kp_h_reg');
  if(reg){
    if(s.regime==='long'){reg.textContent='Long γ'; reg.className='kpv g';}
    else if(s.regime==='short'){reg.textContent='Short γ'; reg.className='kpv r';}
    else {reg.textContent='—'; reg.className='kpv';}
  }
}
function buildGexHeat(chain,spot,mode){
  var exps=(chain.chain||[]).slice(0,18);
  var lo=spot?spot*0.85:-Infinity, hi=spot?spot*1.15:Infinity;
  var S=spot||0, sc=100*S*S*0.01/1e6;
  var set={};
  exps.forEach(function(e){(e.strikes||[]).forEach(function(s){var k=s[0]; if(k>=lo&&k<=hi) set[k]=true;});});
  var strikes=Object.keys(set).map(Number).sort(function(a,b){return a-b;});
  var maps=exps.map(function(e){var m={}; (e.strikes||[]).forEach(function(s){m[s[0]]=s;}); return m;});
  var z=strikes.map(function(k){
    return maps.map(function(m){
      var s=m[k]; if(!s) return null;
      var c=callVals(s), p=putVals(s);
      var cg=num(c[IDX.GAMMA])*num(c[IDX.OI]), pg=num(p[IDX.GAMMA])*num(p[IDX.OI]);
      var g = mode==='call' ? cg*sc : mode==='put' ? -pg*sc : (cg-pg)*sc;
      return isFinite(g)?g:null;
    });
  });
  // Per-cell IV/OI carried as a single pre-formatted string per cell, so
  // Plotly's hovertemplate can use %{customdata} once. Shape mirrors z
  // (null where the strike is missing for this expiry). Format:
  //   "IV 5.2% · OI 10,234 · C 5.0% · P 4.5%"
  // Splitting into nested-array customdata and indexing %{customdata[N]}
  // is fragile across Plotly client builds; this avoids that dependability
  // hole and keeps the per-cell payload a single human-readable line.
  function fmtPctIV(v){return v!=null?(v*100).toFixed(1)+'%':'—';}
  var cd=strikes.map(function(k){
    return maps.map(function(m){
      var s=m[k]; if(!s) return null;
      var c=callVals(s),p=putVals(s);
      var ci=c[IDX.IV],pi=p[IDX.IV];
      var oi=num(c[IDX.OI])+num(p[IDX.OI]);
      return 'IV '+fmtPctIV(ci!=null&&pi!=null?(ci+pi)/2:null)
        +' · OI '+oi.toLocaleString()
        +' · C '+fmtPctIV(ci)
        +' · P '+fmtPctIV(pi);
    });
  });
  return {x:exps.map(function(e){return e.expiration;}),y:strikes,z:z,cd:cd};
}

// ---- Derived market structure (computed by us from the live chain) --------
// Net dealer GEX per strike, aggregated across ALL expirations ($ per 1% move).
function aggGex(chain,spot){
  var agg={};
  (chain.chain||[]).forEach(function(e){(e.strikes||[]).forEach(function(s){
    var k=s[0],c=callVals(s),p=putVals(s);
    var g=(num(c[IDX.GAMMA])*num(c[IDX.OI]) - num(p[IDX.GAMMA])*num(p[IDX.OI]))*100*spot*spot*0.01;
    if(isFinite(g)) agg[k]=(agg[k]||0)+g;
  });});
  return agg;
}
// Gamma flip = strike where cumulative net GEX (low→high) crosses zero (interpolated).
function gammaFlip(agg){
  var ks=Object.keys(agg).map(Number).sort(function(a,b){return a-b;});
  var cum=0,prevCum=null,prevK=null;
  for(var i=0;i<ks.length;i++){
    cum+=agg[ks[i]];
    if(prevCum!=null && ((prevCum<0&&cum>=0)||(prevCum>0&&cum<=0)) && cum!==prevCum){
      var t=prevCum/(prevCum-cum); return prevK+(ks[i]-prevK)*t;
    }
    prevCum=cum; prevK=ks[i];
  }
  return null;
}
// Max pain (one expiry): strike minimising total in-the-money payout to holders.
function maxPain(exp){
  var rows=expData(exp).filter(function(r){return r.cOI||r.pOI;});
  if(!rows.length) return null;
  var best=null,bestPay=Infinity;
  rows.forEach(function(t){
    var K=t.strike,pay=0;
    rows.forEach(function(r){
      if(r.strike<K) pay+=(K-r.strike)*r.cOI;
      else if(r.strike>K) pay+=(r.strike-K)*r.pOI;
    });
    if(pay<bestPay){bestPay=pay; best=K;}
  });
  return best;
}
function dteOf(expStr){
  if(!expStr) return null;
  var d=new Date(expStr+'T16:00:00Z'), now=new Date();
  return Math.max((d-now)/86400000, 0);
}
// Structure summary for the key-levels strip on GammaMap.
// ATM IV: nearest-to-spot strike, mean of call/put IV for that expiry.
// IV Skew = call_iv@+5% − put_iv@−5% (sign tells you whether calls or puts
// are pricier market-wide on this name; magnitude is the curve steepness).
// Computed per-expiry then averaged over non-zero expiries so the KPI stays
// meaningful as the user flips through short-dated weeks vs long-dated LEAPs.
function skewAt(exp,spot){
  if(!exp||!spot) return null;
  var lo=spot*0.95, hi=spot*1.05;
  var cl=null,pu=null,cDst=Infinity,pDst=Infinity;
  (exp.strikes||[]).forEach(function(s){
    var k=s[0]; if(k<lo||k>hi) return;
    var c=callVals(s),p=putVals(s);
    var cv=c[IDX.IV],pv=p[IDX.IV];
    if(cv!=null){var d=Math.abs((k-spot)/spot); if(d<cDst){cDst=d; cl=cv;}}
    if(pv!=null){var d=Math.abs((k-spot)/spot); if(d<pDst){pDst=d; pu=pv;}}
  });
  if(cl==null||pu==null) return null;
  return cl-pu;
}
function avgSkew(chain,spot){
  if(!spot) return null;
  var sum=0,cnt=0;
  (chain.chain||[]).forEach(function(e){var s=skewAt(e,spot); if(s!=null){sum+=s; cnt++;}});
  return cnt?sum/cnt:null;
}
function atmIvOf(exp,spot){
  if(!exp) return null;
  var bs=null,bg=Infinity;
  (exp.strikes||[]).forEach(function(s){var k=s[0],g=spot?Math.abs(k-spot):Infinity;if(g<bg){bg=g;bs=s;}});
  if(!bs) return null;
  var a=[callVals(bs)[IDX.IV],putVals(bs)[IDX.IV]].filter(function(v){return v!=null;});
  return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:null;
}
function computeStructure(){
  var spot=st.spot||0, exp=st.chain.chain[curExpIdx()];
  var agg=aggGex(st.chain,spot);
  var net=0; Object.keys(agg).forEach(function(k){net+=agg[k];});
  var flip=gammaFlip(agg);
  var mp=exp?maxPain(exp):null;
  var iv=exp?atmIvOf(exp,spot):null;
  var dte=exp?dteOf(exp.expiration):null;
  var em=(iv!=null&&dte!=null&&spot)?spot*iv*Math.sqrt(dte/365):null;
  var skew=avgSkew(st.chain,spot);
  return {spot:spot,net:net,flip:flip,maxpain:mp,iv:iv,dte:dte,em:em,skew:skew,
          regime:spot?(net>=0?'long':'short'):null};
}
// ---- GammaMap widgets (top strikes, per-expiry contribution bars) --------
// Top-strike sidebar: take the aggregated net GEX dict, return HTML for the
// top-3 long-γ and top-3 short-γ strikes as compact rows. Long γ = pin /
// stabilising force (dealers will be buyers on dips). Short γ = accelerant
// (dealers sell into rallies, buy into sell-offs). Listing both side-by-side
// is the at-a-glance put/call-style read on dealer positioning.
function buildTopStrikes(agg,spot){
  if(!spot) return {long:'<div class="sub" style="padding:6px">— no spot —</div>',short:'<div class="sub" style="padding:6px">—</div>'};
  var arr=Object.keys(agg).map(function(k){return {k:Number(k),g:agg[k]};}).filter(function(x){return isFinite(x.g);});
  if(!arr.length) return {long:'<div class="sub" style="padding:6px">— empty —</div>',short:'<div class="sub" style="padding:6px">— empty —</div>'};
  var longs=arr.slice().sort(function(a,b){return b.g-a.g;}).slice(0,3);
  var shorts=arr.slice().sort(function(a,b){return a.g-b.g;}).slice(0,3);
  function row(x,sign){
    var k=x.k%1===0?x.k.toFixed(0):x.k.toFixed(2);
    var v=(x.g/1e6);
    var cls=sign?'s':'l';
    var sign2=x.g>=0?'+':'';
    return '<div class="pinrow '+cls+'"><span class="k">'+k+'</span><span class="v">'+sign2+v.toFixed(1)+'M</span></div>';
  }
  return {long:longs.map(function(x){return row(x,0);}).join('')||'<div class="sub" style="padding:6px">—</div>',
          short:shorts.map(function(x){return row(x,1);}).join('')||'<div class="sub" style="padding:6px">—</div>'};
}
function renderTopStrikes(){
  var ts=buildTopStrikes(aggGex(st.chain,st.spot),st.spot);
  var pl=document.getElementById('pinlong');
  var ps=document.getElementById('pinshort');
  if(pl) pl.innerHTML=ts.long;
  if(ps) ps.innerHTML=ts.short;
}
// Per-expiry contribution bar (drawn under the heatmap): aggregated signed
// net GEX per expiry, top 8 by absolute size. Shows which week/month is
// driving the chip-wide gamma picture — useful when 0DTE dominates and the
// monthly summary hides it.
function drawExpBars(){
  var el=document.getElementById('heatexp'); if(!el||!st.chain) return;
  var exps=st.chain.chain||[]; if(!exps.length){Plotly.purge(el); el.innerHTML='<div class="em">No expiries</div>'; return;}
  var S=st.spot||0, sc=100*S*S*0.01/1e6;
  var bars=exps.map(function(e){
    var net=0; (e.strikes||[]).forEach(function(s){
      var c=callVals(s),p=putVals(s);
      var g=(num(c[IDX.GAMMA])*num(c[IDX.OI]) - num(p[IDX.GAMMA])*num(p[IDX.OI]))*sc;
      if(isFinite(g)) net+=g;
    });
    return {n:e.expiration,v:net};
  }).filter(function(x){return isFinite(x.v)&&x.v!==0;});
  if(!bars.length){Plotly.purge(el); el.innerHTML='<div class="em">No contribution data</div>'; return;}
  bars.sort(function(a,b){return Math.abs(b.v)-Math.abs(a.v);}); bars=bars.slice(0,8);
  var trace={type:'bar',orientation:'h',
    x:bars.map(function(x){return x.v;}),
    y:bars.map(function(x){return x.n;}),
    marker:{color:bars.map(function(v){return v.v>=0?'rgba(52,211,153,.85)':'rgba(244,63,94,.85)';})},
    text:bars.map(function(v){return (v.v>=0?'+':'')+v.v.toFixed(0);}),
    textposition:'outside',
    textfont:{color:'#7a8599',size:9},
    hovertemplate:'%{y}<br>Net GEX: %{x:+.1f} $MM/1%<extra></extra>'};
  var layout={
    paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
    margin:{l:84,r:46,t:8,b:6},height:118,
    xaxis:{color:'#475569',zeroline:true,zerolinecolor:'#475569',gridcolor:'#1e293b',tickfont:{color:'#64748b',size:8},title:{text:'$MM / 1%',font:{color:'#7a8599',size:9}}},
    yaxis:{color:'#64748b',tickfont:{color:'#64748b',size:9},autorange:'reversed'},
    shapes:[], uirevision:'heat-exp',showlegend:false
  };
  Plotly.react(el,[trace],layout,PLOT);
}

// ---- Init & scheduler -----------------------------------------------------
// One 5s tick decides what is actually DUE instead of blind dual timers:
// the chain refreshes only when the current ticker's cache has aged past
// CHAIN_TTL, the scan only while the Flow tab is showing, and nothing at all
// while the preview is hidden or a 429 cool-down is active.
function tick(){
  if(document.hidden) return;
  var now=Date.now();
  if(now<rlUntil){ setStatus(); return; }
  var c=chainCache[st.tk];
  if((!c||now-c.at>=CHAIN_TTL)&&!failBlocked('chain:'+st.tk)) loadData();
  if(st.tab==='flow'&&(!scanCache.at||now-scanCache.at>=SCAN_TTL)&&!failBlocked('scan')) loadScan();
}
shell();
tick();
setInterval(tick,5000);
document.addEventListener('visibilitychange',function(){ if(!document.hidden) tick(); });
})();
</script>
</body>
</html>
